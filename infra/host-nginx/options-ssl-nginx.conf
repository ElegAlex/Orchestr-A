# Certbot-managed TLS options, `include`d by the orchestr-a vhost.
# LIVE PATH ON THE VPS: /etc/letsencrypt/options-ssl-nginx.conf
#
# Because this is included INSIDE the `server { listen 443 ssl; ... }` block,
# its `ssl_protocols TLSv1.2 TLSv1.3` overrides the weaker http-level default
# in /etc/nginx/nginx.conf (which still lists TLSv1 TLSv1.1 for legacy vhosts).
# The orchestr-a.com vhost therefore floors at TLSv1.2 — this is the resolution
# state of the SEC-001 "weak ssl_protocols floor" residue. Contents are based on
# the Mozilla intermediate profile (https://ssl-config.mozilla.org).
#
# Captured read-only from prod 2026-06-07. Certbot owns this file on the host;
# editing it there disables certbot's automatic security updates. Treat this
# copy as the audit/source-of-truth mirror, not the deploy artifact.

ssl_session_cache shared:le_nginx_SSL:10m;
ssl_session_timeout 1440m;
ssl_session_tickets off;

ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;

ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
