# ORCHESTR'A — host (edge) nginx server block
# LIVE PATH ON THE VPS: /etc/nginx/sites-available/orchestr-a
#   (symlinked into /etc/nginx/sites-enabled/orchestr-a)
#
# This is the OUT-OF-REPO TLS terminator: a host-level nginx (Debian package,
# nginx/1.22.1) that listens on :443, terminates TLS with Let's Encrypt certs,
# and reverse-proxies cleartext to the docker-compose stack on the loopback
# (127.0.0.1:8080 — the compose `nginx` service, rebound to loopback by the
# c47dd3f0 cutover so :8080/:8443 are no longer world-exposed).
#
# It is NOT applied by `pnpm`/Docker; it is managed directly on the host by
# certbot (`authenticator = nginx`, `installer = nginx`). Captured here as the
# versioned source of truth — see README.md in this directory. Captured
# read-only from prod 2026-06-07; certbot-managed lines preserved verbatim.

server {
    server_name orchestr-a.com www.orchestr-a.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    ssl_certificate /etc/letsencrypt/live/orchestr-a.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/orchestr-a.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.orchestr-a.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = orchestr-a.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name orchestr-a.com www.orchestr-a.com;
    return 404; # managed by Certbot




}
