# Certbot renewal config for the orchestr-a.com certificate.
# LIVE PATH ON THE VPS: /etc/letsencrypt/renewal/orchestr-a.com.conf
#
# Documents HOW the edge certificate is issued/renewed. The ACME `account`
# identifier has been redacted (it points at the account key under
# /etc/letsencrypt/accounts/ — kept off-repo). No private key material is, or
# should ever be, committed here.
#
# Captured read-only from prod 2026-06-07.

# renew_before_expiry = 30 days
version = 2.1.0
archive_dir = /etc/letsencrypt/archive/orchestr-a.com
cert = /etc/letsencrypt/live/orchestr-a.com/cert.pem
privkey = /etc/letsencrypt/live/orchestr-a.com/privkey.pem
chain = /etc/letsencrypt/live/orchestr-a.com/chain.pem
fullchain = /etc/letsencrypt/live/orchestr-a.com/fullchain.pem

# Options used in the renewal process
[renewalparams]
account = <REDACTED — see /etc/letsencrypt/accounts/ on the host>
authenticator = nginx
server = https://acme-v02.api.letsencrypt.org/directory
key_type = ecdsa
installer = nginx
